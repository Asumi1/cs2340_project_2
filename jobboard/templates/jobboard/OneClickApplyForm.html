{% extends 'base.html' %}

{% block title %}One-Click Apply{% endblock %}

{% block content %}
<main class="max-w-3xl mx-auto px-4 py-28">
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-700 p-6 md:p-8 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">One-Click Apply</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">
            {{ job.title }} at {{ job.company_name }}
        </p>

        <form method="post" action="{% url 'one_click_apply_submit' job.pk %}" enctype="multipart/form-data" class="mt-6 space-y-5">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Full Name</label>
                    <input type="text" value="{{ request.user.first_name }} {{ request.user.last_name }}" readonly class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 py-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email</label>
                    <input type="email" value="{{ request.user.email }}" readonly class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 px-3 py-2 text-sm">
                </div>
            </div>

            <div>
                <label for="tailored_note" class="block text-xs font-semibold text-slate-500 uppercase mb-1">Tailored Note</label>
                <textarea id="tailored_note" name="tailored_note" rows="5" class="w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-3 py-2 text-sm" placeholder="Add a short personalized note to the recruiter."></textarea>
            </div>

            <div>
                <label for="resume" class="block text-xs font-semibold text-slate-500 uppercase mb-1">Resume (Optional)</label>
                <input id="resume" name="resume" type="file" class="block w-full text-sm text-slate-600 dark:text-slate-300 file:mr-3 file:rounded-lg file:border-0 file:bg-slate-100 dark:file:bg-slate-700 file:px-3 file:py-2">
                {% if user_profile and user_profile.resume_file %}
                <p class="text-xs text-slate-500 mt-2">
                    Current profile resume: <a href="{{ user_profile.resume_file.url }}" target="_blank" class="text-teal-600 hover:underline">View</a>
                </p>
                {% endif %}
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="inline-flex items-center gap-2 bg-teal-400 hover:bg-teal-500 text-slate-900 font-bold px-5 py-2.5 rounded-xl transition-colors">
                    Submit Application
                </button>
                <a href="{% url 'job_detail' job.pk %}" class="text-sm text-slate-600 dark:text-slate-300 hover:underline">Cancel</a>
            </div>
        </form>
    </div>
</main>
{% endblock %}

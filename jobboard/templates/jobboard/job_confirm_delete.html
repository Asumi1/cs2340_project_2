{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Job - MintMatch{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-20 max-w-lg relative z-10">
    <div class="bg-white/80 backdrop-blur-md rounded-2xl shadow-xl p-8 border border-white/50 text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-6 animate-pulse">
            <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-900 mb-2">Delete Job Posting?</h2>
        <p class="text-gray-500 mb-8 px-4">
            Are you sure you want to delete the job "<strong>{{ job.title }}</strong>"? This action cannot be undone.
        </p>

        <form method="post" class="flex flex-col sm:flex-row gap-4 justify-center">
            {% csrf_token %}
            <a href="{% url 'recruiter_dashboard' %}" class="w-full inline-flex justify-center rounded-xl border border-gray-300 shadow-sm px-4 py-3 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:w-auto sm:text-sm transition-colors">
                Cancel
            </a>
            <button type="submit" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-3 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:w-auto sm:text-sm transition-colors">
                Delete Job
            </button>
        </form>
    </div>
</div>
{% endblock %}

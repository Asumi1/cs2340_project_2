<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MintMatch Signup Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06f9bc",
                        "primary-dark": "#04dcb5",
                        "charcoal": "#1a1f24",
                        "charcoal-light": "#4b5563",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(135deg, #f0fdf9 0%, #ffffff 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(230, 230, 230, 0.8);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #06f9bc;
            box-shadow: 0 0 0 4px rgba(6, 249, 188, 0.1);
        }
        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #06f9bc;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #06f9bc;
        }
    </style>
</head>
<body class="text-charcoal overflow-x-hidden min-h-screen relative flex flex-col">
<div class="fixed top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<div class="ambient-blob bg-primary/20 w-[600px] h-[600px] top-[-150px] left-[-150px]"></div>
<div class="ambient-blob bg-blue-200/40 w-[500px] h-[500px] bottom-[5%] right-[-150px]"></div>
<div class="ambient-blob bg-primary/10 w-[300px] h-[300px] top-[30%] left-[40%]"></div>
</div>
<nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
<div class="glass-panel rounded-full px-6 py-3 flex items-center gap-8 md:gap-12">
<a class="flex items-center gap-2 group" href="#">
<div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-charcoal">
<span class="material-symbols-outlined text-[20px]">diamond</span>
</div>
<span class="font-bold text-lg tracking-tight hidden sm:block text-charcoal">MintMatch</span>
</a>
<div class="flex items-center gap-3">
<a class="text-sm font-medium text-gray-600 hover:text-charcoal transition-colors" href="#">Back to Home</a>
</div>
</div>
</nav>
<div class="relative z-10 flex flex-col items-center justify-center flex-grow px-4 w-full pt-20 pb-10">
<div class="glass-panel w-full max-w-md rounded-3xl p-8 md:p-10 shadow-xl border border-white/60 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div>
<div class="flex justify-center mb-8">
<div class="bg-gray-100/80 p-1 rounded-full flex relative w-64 h-10 border border-gray-200/50">
<input checked="" class="peer/seeker hidden" id="job-seeker" name="role" type="radio"/>
<input class="peer/recruiter hidden" id="recruiter" name="role" type="radio"/>
<label class="w-1/2 flex items-center justify-center gap-2 rounded-full cursor-pointer z-10 transition-all duration-300 text-sm font-bold text-gray-500 peer-checked/seeker:bg-white peer-checked/seeker:text-charcoal peer-checked/seeker:shadow-sm" for="job-seeker">
<span class="material-symbols-outlined text-lg">person</span>
                        Job Seeker
                    </label>
<label class="w-1/2 flex items-center justify-center gap-2 rounded-full cursor-pointer z-10 transition-all duration-300 text-sm font-bold text-gray-500 peer-checked/recruiter:bg-white peer-checked/recruiter:text-charcoal peer-checked/recruiter:shadow-sm" for="recruiter">
<span class="material-symbols-outlined text-lg">business_center</span>
                        Recruiter
                    </label>
</div>
</div>
<div class="text-center mb-8">
<h2 class="text-3xl font-bold text-charcoal mb-2 tracking-tight">Create Account</h2>
<p class="text-gray-500 text-sm">Join MintMatch to find your dream career.</p>
</div>
<form action="#" class="space-y-5">
<div class="flex flex-col sm:flex-row gap-4">
<div class="space-y-1.5 w-full">
<label class="block text-sm font-bold text-charcoal ml-1" for="firstname">First Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">person</span>
</div>
<input class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-charcoal placeholder-gray-400 focus:outline-none transition-all duration-200" id="firstname" placeholder="John" type="text"/>
</div>
</div>
<div class="space-y-1.5 w-full">
<label class="block text-sm font-bold text-charcoal ml-1" for="lastname">Last Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">badge</span>
</div>
<input class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-charcoal placeholder-gray-400 focus:outline-none transition-all duration-200" id="lastname" placeholder="Doe" type="text"/>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-bold text-charcoal ml-1" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">mail</span>
</div>
<input class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-charcoal placeholder-gray-400 focus:outline-none transition-all duration-200" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-bold text-charcoal ml-1" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400 text-xl">lock</span>
</div>
<input class="glass-input w-full pl-11 pr-4 py-3 rounded-xl text-charcoal placeholder-gray-400 focus:outline-none transition-all duration-200" id="password" placeholder="Create a password" type="password"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary-dark text-charcoal font-bold py-3.5 rounded-xl shadow-[0_4px_14px_0_rgba(6,249,188,0.39)] hover:shadow-[0_6px_20px_rgba(6,249,188,0.23)] hover:-translate-y-0.5 transition-all duration-200 mt-2" type="button">
                    Create Account
                </button>
</form>
<div class="mt-8 text-center">
<p class="text-sm text-gray-500">
                    Already have an account? 
                    <a class="text-charcoal font-bold hover:text-primary-dark hover:underline decoration-2 underline-offset-4 transition-all" href="#">Sign In</a>
</p>
</div>
</div>
<div class="mt-8 text-center text-xs text-gray-400 font-medium relative z-10">
            © 2024 MintMatch Inc. All rights reserved.
        </div>
</div>
</body></html>
